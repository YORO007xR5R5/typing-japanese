<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Typing</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Japanese Typing</h2>

<select id="category"></select>

<div class="stats">
    <div class="stat">WPM: <span id="wpm">0</span></div>
    <div class="stat">Accuracy: <span id="accuracy">100%</span></div>
    <div class="stat">Score: <span id="score">0</span></div>
    <div class="stat">Time: <span id="time">0</span>s</div>
</div>

<div id="textDisplay"></div>
<div id="romaji"></div>
<div id="meaning"></div>

<textarea id="inputBox" placeholder="พิมพ์ที่นี่..."></textarea>
<script type="module" src="script.js"></script>
</div>


<script src="script.js"></script>
</body>
</html>
